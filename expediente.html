<style>
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#eef4fb}
/* ====== EXPEDIENTE CLINICO (modulo nuevo, aditivo) ====== */
#exp-fab{position:fixed;right:18px;bottom:18px;z-index:9000;background:linear-gradient(135deg,#1a3a5c,#2a6cb0);color:#fff;border:none;border-radius:30px;padding:12px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25)}
#exp-fab:hover{opacity:.92}
#exp-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,40,.55);z-index:9500;align-items:flex-start;justify-content:center;overflow:auto;padding:24px}
#exp-overlay.show{display:flex}
.exp-panel{background:#fff;border-radius:14px;width:100%;max-width:860px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;margin:auto}
.exp-hd{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #dce2e8;background:#f7f9fb}
.exp-hd h2{font-size:16px;color:#1a3a5c;margin:0;flex:1}
.exp-x{background:none;border:none;font-size:24px;cursor:pointer;color:#5a6474;line-height:1}
.exp-pac{font-size:12px;color:#5a6474;padding:8px 18px;background:#eef4fb;border-bottom:1px solid #dce2e8}
.exp-pac b{color:#1a3a5c}
.exp-tabs{display:flex;gap:4px;padding:8px 18px 0;border-bottom:1px solid #dce2e8;flex-wrap:wrap}
.exp-tab{padding:8px 12px;font-size:12px;border:none;background:none;cursor:pointer;color:#5a6474;border-bottom:2px solid transparent}
.exp-tab.active{color:#1a3a5c;font-weight:700;border-bottom-color:#2a6cb0}
.exp-body{padding:18px}
.exp-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.exp-f{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.exp-f label{font-size:11px;font-weight:600;color:#5a6474}
.exp-f input,.exp-f select{padding:9px 11px;font-size:13px;border:1.5px solid #dce2e8;border-radius:8px;outline:none;font-family:inherit}
.exp-f input:focus,.exp-f select:focus{border-color:#2a6cb0}
.exp-ft{display:flex;gap:10px;align-items:center;padding:14px 18px;border-top:1px solid #dce2e8;background:#f7f9fb;flex-wrap:wrap}
.exp-btn{padding:10px 16px;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer}
.exp-btn-pri{background:linear-gradient(135deg,#1a3a5c,#2a6cb0);color:#fff}
.exp-btn-sec{background:#eef2f6;color:#1a3a5c;border:1px solid #dce2e8}
.exp-msg{font-size:12px;margin-left:auto;font-weight:600}
.exp-soon{padding:40px 20px;text-align:center;color:#8a95a3;font-size:13px}
@media print{#exp-fab,#exp-overlay{display:none!important}}
@media(max-width:600px){.exp-g2{grid-template-columns:1fr}}
</style>

      if(P.motivo){o.motivo=gv('ce-motivo');o.dx=gv('ce-dx');}
      if(P.campos){o.campos={};P.campos.forEach(function(c){o.campos[c.id]=gv('ce-c-'+c.id);});}

      function sv(id,v){var e=elx(id);if(e)e.value=(v==null?'':v);}

      if(P.responsable){sv('ce-resp-nombre',rs.nombre);sv('ce-resp-parent',rs.parentesco);sv('ce-resp-tel',rs.tel);sv('ce-resp-ident',rs.ident);}
      if(P.motivo){sv('ce-motivo',o.motivo);sv('ce-dx',o.dx);}
      if(P.campos){var cv=o.campos||{};P.campos.forEach(function(c){sv('ce-c-'+c.id,cv[c.id]);});}

      sv('ce-datos',o.datos);
      sv('ce-f-pac',fm.paciente);sv('ce-f-med',fm.medico);sv('ce-f-ced',fm.cedula);sv('ce-f-resp',fm.responsable);sv('ce-f-resp-par',fm.resp_par);sv('ce-f-t1',fm.testigo1);sv('ce-f-t2',fm.testigo2);sv('ce-f-col',fm.colaborador);sv('ce-f-cargo',fm.cargo);
      var sel=o.sel||{};
      P.secciones.forEach(function(s,idx){if(s.tipo==='check'||s.tipo==='docs'){var arr=sel[idx]||[];Array.prototype.slice.call(document.querySelectorAll('#con-engine .ant-chk[data-sec="'+idx+'"] input')).forEach(function(c){c.checked=arr.indexOf(c.value)>=0;});}});

      if(!w){fmsg('Permite las ventanas emergentes para generar el PDF.','err');return;}
      w.document.open();w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Formato</title></head><body style="margin:0;padding:16px">'+buildHTML(tipo,blank)+'</body></html>');w.document.close();
      setTimeout(function(){try{w.focus();w.print();}catch(e){}},450);
    }
    async function doSave(tipo){
      var P=TIPOS[tipo];
      var folio=(elx('exp-folio')&&elx('exp-folio').value||'').trim();
      if(!folio){fmsg('Escribe un folio (pestana Ficha) para guardar.','err');return;}
      if(!window.caSupa){fmsg('Sin nube: inicia sesion para guardar. (El PDF si funciona.)','warn');return;}
      var b=elx('fb-guardar');b.textContent='Guardando...';
      try{
        var med=gv('fb-medico')+(gv('fb-ced')?' (Ced. '+gv('fb-ced')+')':'');
        var r=await window.caSupa.from('notas').insert({folio:folio,tipo:P.key,fecha:(gv('fb-fecha')?new Date(gv('fb-fecha')+'T00:00').toISOString():new Date().toISOString()),medico:med,contenido:gather(P)});
        if(r.error)throw r.error;fmsg('Formato guardado \u2713','ok');
      }catch(e){fmsg('No se pudo guardar: '+(e.message||e),'err');}
      b.textContent='Guardar formato';
    }
  })();

  /* ===== Limite de 3000 palabras en notas (aditivo) ===== */
  (function initWordLimit(){
    var IDS=['nota-motivo','nota-padecimiento','nota-ef'];var MAX=3000;
    function words(s){s=String(s||'').trim();return s?s.split(/\s+/).length:0;}
    function wire(id){
      var e=document.getElementById(id);if(!e||e.dataset.wl)return;e.dataset.wl='1';
      var c=document.createElement('div');c.style.cssText='font-size:10px;color:#7a8694;text-align:right;margin-top:-2px';
      function upd(){var w=words(e.value);if(w>MAX){e.value=e.value.trim().split(/\s+/).slice(0,MAX).join(' ');w=MAX;}c.textContent=w+' / '+MAX+' palabras';c.style.color=(w>=MAX?'#b83232':'#7a8694');}
      if(e.parentNode)e.parentNode.appendChild(c);
      e.addEventListener('input',upd);upd();
    }
    IDS.forEach(wire);
  })();

  /* ===== Verificacion de cedula en SEP (aditivo) ===== */
  (function initSEP(){
    var med=document.getElementById('exp-medico'),ced=document.getElementById('exp-cedula'),btn=document.getElementById('exp-verif-sep');
    if(!btn)return;
    try{var sc=localStorage.getItem('ca_cedula');if(sc&&ced&&!ced.value)ced.value=sc;}catch(e){}
    if(ced)ced.addEventListener('change',function(){try{localStorage.setItem('ca_cedula',(ced.value||'').trim());}catch(e){}});
    btn.addEventListener('click',function(){
      var c=(ced&&ced.value||'').trim();var n=(med&&med.value||'').trim();
      try{if(navigator.clipboard&&(c||n))navigator.clipboard.writeText(c||n);}catch(e){}
      var m=document.getElementById('exp-msg');if(m){m.textContent='Se abrio el Registro Nacional de Profesionistas (SEP). La cedula se copio: pegala en la busqueda.';m.style.color='#1b7a5a';}
      window.open('https://www.cedulaprofesional.sep.gob.mx/','_blank','noopener');
    });
  })();
})();
</script>
<script>
/* Abrir el panel del expediente automaticamente al cargar */
setTimeout(function(){ var f=document.getElementById('exp-fab'); if(f) f.click(); }, 200);
</script>
